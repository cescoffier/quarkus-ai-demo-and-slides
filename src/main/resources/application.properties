# OpenAI
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o

# PostgreSQL — Dev Services auto-starts a container
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=drop-and-create

# RAG — easy-rag ingests documents from this path
quarkus.langchain4j.easy-rag.path=rag
quarkus.langchain4j.easy-rag.max-segment-size=300
quarkus.langchain4j.easy-rag.max-overlap-size=30

# Static resources
quarkus.http.enable-compression=true
